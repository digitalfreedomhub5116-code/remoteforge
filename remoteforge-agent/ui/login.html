<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RemoteForge — Sign In</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0a0a0b;
      color: #e8e8eb;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #8ab4f8, transparent 70%);
      top: -50px; right: -60px;
      animation: float 18s ease-in-out infinite;
    }
    .orb-2 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, #a78bfa, transparent 70%);
      bottom: -40px; left: -40px;
      animation: float 22s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.05); }
      66% { transform: translate(-15px, 20px) scale(0.95); }
    }

    /* Card */
    .login-card {
      position: relative;
      z-index: 1;
      width: 380px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 40px 32px;
      backdrop-filter: blur(20px);
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #8ab4f8, #4285f4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; }
    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: #f0f0f2;
    }
    .logo-text p {
      font-size: 12px;
      color: #5a5a65;
      margin-top: 2px;
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #7a7a85;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e8e8eb;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: rgba(138,180,248,0.3);
    }
    .form-input::placeholder { color: #4a4a55; }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #8ab4f8, #669df6);
      color: #0a0a0b;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(138,180,248,0.25);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: wait;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }
    .divider span {
      font-size: 11px;
      color: #5a5a65;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-google {
      width: 100%;
      padding: 11px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: #c4c7c5;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
    }
    .btn-google svg { width: 18px; height: 18px; }

    /* Error */
    .error-msg {
      display: none;
      padding: 10px 14px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.15);
      border-radius: 10px;
      color: #f87171;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .error-msg.visible { display: block; }

    /* Info */
    .info-text {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #5a5a65;
      line-height: 1.5;
    }

    /* Loading overlay */
    .loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10,10,11,0.85);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .loading-overlay.visible { display: flex; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(138,180,248,0.15);
      border-top-color: #8ab4f8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 14px;
      color: #8ab4f8;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="login-card">
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <span class="loading-text" id="loadingText">Signing in...</span>
    </div>

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>RemoteForge</h1>
        <p>Sign in to connect this PC</p>
      </div>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Google Button -->
    <button class="btn-google" onclick="googleSignIn()">
      <svg viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <div class="divider"><span>or use email</span></div>

    <!-- Email Form -->
    <form onsubmit="emailSignIn(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Your password" required>
      </div>
      <button class="btn-primary" type="submit" id="signInBtn">Sign In</button>
    </form>

    <p class="info-text">
      Use the same account you signed up with on the mobile app.
    </p>
  </div>

  <script>
    const errorMsg = document.getElementById('errorMsg');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }
    function hideError() {
      errorMsg.classList.remove('visible');
    }
    function showLoading(text) {
      loadingText.textContent = text || 'Signing in...';
      loading.classList.add('visible');
    }
    function hideLoading() {
      loading.classList.remove('visible');
    }

    async function emailSignIn(e) {
      e.preventDefault();
      hideError();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) return showError('Please fill in both fields');
      
      showLoading('Signing in...');
      
      try {
        const result = await window.remoteforge.signIn(email, password);
        if (result.error) {
          hideLoading();
          showError(result.error);
        } else {
          showLoading('Registering device...');
          // Main process handles the rest (saves tokens, starts agent, switches to status window)
        }
      } catch (err) {
        hideLoading();
        showError('Connection failed. Check your internet.');
      }
    }

    async function googleSignIn() {
      hideError();
      showLoading('Opening browser...');
      try {
        await window.remoteforge.signInWithGoogle();
      } catch (err) {
        hideLoading();
        showError('Google sign-in failed');
      }
    }
  </script>
</body>
</html>
